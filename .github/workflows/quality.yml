name: quality

# Gates that back the README's headline quality claims.
# - wikilinks: every [[link]] in the brain must resolve (the "100% resolved" badge).
# - markdownlint: the repo's own authored docs stay well-formed.
# - rust-examples: every `rust` example type-checks (edition 2024). A known set of
#   intentional error-demos and project-structure snippets is allowlisted; any NEW
#   example that fails to compile breaks the build.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  wikilinks:
    name: Wikilink resolution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Every [[wikilink]] must resolve
        run: python3 scripts/check-wikilinks.py wiki

  markdownlint:
    name: Markdown lint (authored docs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          config: .markdownlint.json
          globs: |
            README.md
            CONTRIBUTING.md
            CODE_OF_CONDUCT.md
            SECURITY.md
            SUPPORT.md
            CHANGELOG.md
            .github/**/*.md

  rust-examples:
    name: Rust examples compile (edition 2024)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@1.96.0
      - name: Compile-check every rust example
        run: bash scripts/run-rust-gate.sh
